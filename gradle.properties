# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Increase memory for the Gradle daemon and AAPT2 worker processes
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=1g

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official
android.disallowKotlinSourceSets=false

# Modern workaround for AAPT2 startup issues in AGP 9.2.x
# Limits the number of worker processes to reduce resource contention
android.aapt2.daemon.maxProcessCount=1
android.enableAapt2.daemon=false
android.aapt2.use.sdk=true
android.aapt2FromMavenOverride=C\:/Users/Hp/AppData/Local/Android/Sdk/build-tools/37.0.0/aapt2.exe

# Disable VFS watching to avoid potential policy-related file access issues on Windows
org.gradle.vfs.watch=false
